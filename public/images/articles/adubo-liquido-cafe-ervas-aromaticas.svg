<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#451a03"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Coffee cup -->
    <g transform="translate(-25,-50)">
      <rect x="5" y="25" width="40" height="45" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
      <path d="M45,35 Q60,35 60,50 Q60,65 45,65" fill="none" stroke="#92400e" stroke-width="2.5"/>
      <!-- Steam -->
      <path d="M15,25 Q15,10 20,5" fill="none" stroke="#92400e" stroke-width="2" opacity="0.6"/>
      <path d="M25,25 Q25,8 30,3" fill="none" stroke="#92400e" stroke-width="2" opacity="0.4"/>
      <path d="M35,25 Q35,12 40,7" fill="none" stroke="#92400e" stroke-width="2" opacity="0.5"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Adubação Orgânica</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Adubo Líquido com Café</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>