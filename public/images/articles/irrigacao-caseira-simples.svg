<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Watering can -->
    <g transform="translate(-30,-50)">
      <rect x="10" y="20" width="50" height="40" rx="5" fill="none" stroke="#ffffff" stroke-width="3"/>
      <path d="M60,35 L90,20" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <!-- Spout head -->
      <circle cx="92" cy="18" r="8" fill="none" stroke="#0369a1" stroke-width="2"/>
      <!-- Handle -->
      <path d="M20,20 Q35,-10 50,20" fill="none" stroke="#0369a1" stroke-width="3"/>
      <!-- Drops -->
      <circle cx="95" cy="30" r="3" fill="#0369a1" opacity="0.7"/>
      <circle cx="88" cy="35" r="2.5" fill="#0369a1" opacity="0.5"/>
      <circle cx="100" cy="38" r="2" fill="#0369a1" opacity="0.3"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Irrigação</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Irrigação Caseira Simples</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>