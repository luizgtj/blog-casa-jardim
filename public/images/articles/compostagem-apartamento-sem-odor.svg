<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#a16207"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Compost bin -->
    <g transform="translate(-30,-55)">
      <path d="M0,20 L10,90 L50,90 L60,20" fill="none" stroke="#ffffff" stroke-width="3"/>
      <line x1="-5" y1="20" x2="65" y2="20" stroke="#ffffff" stroke-width="3"/>
      <!-- Steam/heat -->
      <path d="M20,15 Q20,0 25,-5" fill="none" stroke="#a16207" stroke-width="2" opacity="0.5"/>
      <path d="M40,15 Q40,0 35,-5" fill="none" stroke="#a16207" stroke-width="2" opacity="0.5"/>
      <!-- Inner lines -->
      <line x1="10" y1="45" x2="50" y2="45" stroke="#a16207" stroke-width="1.5" opacity="0.4"/>
      <line x1="12" y1="65" x2="48" y2="65" stroke="#a16207" stroke-width="1.5" opacity="0.4"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Compostagem</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Compostagem Sem Odor</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>