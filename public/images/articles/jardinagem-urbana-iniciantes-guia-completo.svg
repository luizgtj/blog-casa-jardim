<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Building + plant -->
    <g transform="translate(-45,-55)">
      <rect x="0" y="20" width="30" height="80" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <rect x="5" y="30" width="8" height="8" fill="#166534" opacity="0.3"/>
      <rect x="17" y="30" width="8" height="8" fill="#166534" opacity="0.3"/>
      <rect x="5" y="50" width="8" height="8" fill="#166534" opacity="0.3"/>
      <rect x="17" y="50" width="8" height="8" fill="#166534" opacity="0.3"/>
      <rect x="40" y="50" width="25" height="50" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <!-- Plant on top -->
      <line x1="52" y1="50" x2="52" y2="25" stroke="#166534" stroke-width="3"/>
      <path d="M52,30 Q42,15 38,22" fill="none" stroke="#166534" stroke-width="2"/>
      <path d="M52,25 Q62,10 66,17" fill="none" stroke="#166534" stroke-width="2"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Guias Completos</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Jardinagem Urbana</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>