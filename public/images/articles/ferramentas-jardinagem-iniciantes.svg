<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Trowel -->
    <g transform="translate(-40,-50)">
      <rect x="22" y="0" width="6" height="80" rx="3" fill="#ffffff"/>
      <path d="M12,80 Q25,130 38,80" fill="#059669" stroke="#ffffff" stroke-width="2"/>
    </g>
    <!-- Shears -->
    <g transform="translate(10,-40)">
      <ellipse cx="15" cy="40" rx="14" ry="20" fill="none" stroke="#ffffff" stroke-width="3"/>
      <ellipse cx="45" cy="40" rx="14" ry="20" fill="none" stroke="#ffffff" stroke-width="3"/>
      <line x1="15" y1="20" x2="30" y2="0" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
      <line x1="45" y1="20" x2="30" y2="0" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Casa & Jardim</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Ferramentas de Jardinagem</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>