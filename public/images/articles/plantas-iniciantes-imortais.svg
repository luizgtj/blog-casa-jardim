<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="380" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Icon group centered -->
  <g transform="translate(400,190)">
    
    <!-- Potted plant -->
    <g transform="translate(-25,-60)">
      <path d="M5,70 L15,110 L35,110 L45,70" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
      <line x1="0" y1="70" x2="50" y2="70" stroke="#ffffff" stroke-width="3"/>
      <line x1="25" y1="70" x2="25" y2="20" stroke="#15803d" stroke-width="3"/>
      <path d="M25,30 Q10,15 5,25" fill="none" stroke="#15803d" stroke-width="2.5"/>
      <path d="M25,20 Q40,5 45,15" fill="none" stroke="#15803d" stroke-width="2.5"/>
      <path d="M25,40 Q15,30 10,35" fill="none" stroke="#15803d" stroke-width="2"/>
    </g>
    
  </g>
  <!-- Category badge -->
  <rect x="310" y="310" width="180" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.8)">Plantas</text>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Plantas para Iniciantes</text>
  <!-- Brand -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Jardim Inteligente</text>
</svg>